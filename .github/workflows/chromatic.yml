name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  chromatic:
    name: Visual regression + Storybook publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Chromatic needs full history to compute baselines.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (Storybook depends on the React package)
        run: pnpm --filter "./packages/*" build

      - name: Publish to Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          # Our build script is `build` (Chromatic defaults to `build-storybook`).
          buildScriptName: build
          # Visual changes won't fail the PR — review them in Chromatic UI instead.
          # Flip to false once you want changes to require explicit acceptance.
          exitZeroOnChanges: true
          # TurboSnap: only re-snapshot stories whose component deps changed.
          onlyChanged: true
